<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCOREUP</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#121418;--surface:#1c1f26;--surface2:#22252e;--border:rgba(255,255,255,0.08);--orange:#f56f2c;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--text:#f0f0f0;--muted:#7a7f8e;--muted2:#454a58}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:200;background:rgba(18,20,24,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;padding:0 1.5rem;gap:2rem}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none}
.logo-s{color:var(--orange)}.logo-rest{color:var(--text)}
.live-indicator{display:flex;align-items:center;gap:0.4rem;font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--red);margin-left:auto}
.live-dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.sport-tabs{display:flex;padding:1rem 1.5rem 0;border-bottom:1px solid var(--border)}
.sport-tab{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);padding:0.6rem 1.5rem;cursor:pointer;border-bottom:3px solid transparent;transition:color 0.2s,border-color 0.2s;position:relative;top:1px;user-select:none}
.sport-tab.active.football{color:var(--orange);border-bottom-color:var(--orange)}
.sport-tab.active.basketball{color:var(--blue);border-bottom-color:var(--blue)}
.main{max-width:1300px;margin:0 auto;padding:1.5rem;display:grid;grid-template-columns:1fr 320px;gap:1.5rem}
.col-left{display:flex;flex-direction:column;gap:1.5rem}
.col-right{display:flex;flex-direction:column;gap:1.5rem}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase}
.sec-title span.football{color:var(--orange)}.sec-title span.basketball{color:var(--blue)}
.loading-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite}
.spinner.blue{border-top-color:var(--blue)}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:0.78rem;color:var(--muted);font-weight:500;letter-spacing:0.06em;text-transform:uppercase}
.error-box{background:var(--surface);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:2rem;text-align:center}
.error-box p{color:var(--muted);font-size:0.82rem;line-height:1.6}
.error-box strong{color:var(--red);display:block;margin-bottom:0.5rem}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.1rem;cursor:pointer;transition:border-color 0.25s,transform 0.25s;position:relative;overflow:hidden}
.match-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;opacity:0;transition:opacity 0.25s}
.match-card.football::before{background:var(--orange)}.match-card.basketball::before{background:var(--blue)}
.match-card:hover{transform:translateY(-2px)}
.match-card.football:hover{border-color:rgba(245,111,44,0.35)}
.match-card.basketball:hover{border-color:rgba(59,130,246,0.35)}
.match-card:hover::before{opacity:1}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem}
.card-comp{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.card-status{font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:0.15rem 0.45rem;border-radius:3px}
.card-status.live{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
.card-status.ft{background:rgba(122,127,142,0.1);color:var(--muted)}
.card-status.upcoming{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.card-match{display:flex;justify-content:space-between;align-items:center;gap:0.5rem}
.card-team-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.88rem;letter-spacing:0.03em;text-transform:uppercase;color:var(--text);flex:1;line-height:1.2}
.card-team-name.right{text-align:right}
.card-score{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.2rem;letter-spacing:0.06em;white-space:nowrap;text-align:center;flex-shrink:0}
.card-score.football{color:var(--orange)}.card-score.basketball{color:var(--blue)}
.card-score.upcoming{color:var(--muted2);font-size:0.75rem;font-weight:600}
.card-venue{font-size:0.6rem;color:var(--muted);font-weight:400;margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid var(--border)}
.widget{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.widget-header{padding:0.9rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.widget-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.95rem;letter-spacing:0.1em;text-transform:uppercase}
.widget-title.football{color:var(--orange)}.widget-title.basketball{color:var(--blue)}
.widget-sub{font-size:0.62rem;color:var(--muted);font-weight:500;letter-spacing:0.06em;text-transform:uppercase}
.standings-head{display:grid;grid-template-columns:1.5rem 1fr 2rem 2rem 2rem 2.5rem;padding:0.5rem 1.2rem;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);gap:0.4rem}
.standings-head span{font-size:0.55rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2);text-align:center}
.standings-head span:nth-child(2){text-align:left}
.standing-row{display:grid;grid-template-columns:1.5rem 1fr 2rem 2rem 2rem 2.5rem;padding:0.6rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.03);align-items:center;gap:0.4rem;transition:background 0.2s;cursor:pointer}
.standing-row:last-child{border-bottom:none}
.standing-row:hover{background:rgba(255,255,255,0.03)}
.standing-row.top-f{border-left:2px solid var(--orange)}.standing-row.top-b{border-left:2px solid var(--blue)}
.standing-row>*{text-align:center;font-size:0.75rem;color:var(--muted);font-weight:400}
.standing-row .rk{font-weight:700;color:var(--muted);font-size:0.72rem}
.standing-row .club{text-align:left;color:var(--text);font-weight:600;font-size:0.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.standing-row .pts-f{color:var(--orange);font-weight:800;font-size:0.82rem}
.standing-row .pts-b{color:var(--blue);font-weight:800;font-size:0.82rem}
.scorer-item{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.2s}
.scorer-item:last-child{border-bottom:none}
.scorer-item:hover{background:rgba(255,255,255,0.03)}
.scorer-rank{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;width:1.4rem;text-align:center}
.scorer-rank.top-f{color:var(--orange)}.scorer-rank.top-b{color:var(--blue)}.scorer-rank.dim{color:var(--muted2)}
.scorer-avatar{width:32px;height:32px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.7rem;color:var(--muted);flex-shrink:0;overflow:hidden}
.scorer-avatar img{width:100%;height:100%;object-fit:cover}
.scorer-info{flex:1}.scorer-name{font-size:0.8rem;font-weight:600;color:var(--text)}.scorer-club{font-size:0.62rem;color:var(--muted);font-weight:400}
.scorer-stat{text-align:right}
.scorer-stat .num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem;display:block}
.scorer-stat .num.f{color:var(--orange)}.scorer-stat .num.b{color:var(--blue)}
.scorer-stat .lbl{font-size:0.55rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2)}
.next-item{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.03);gap:0.5rem}
.next-item:last-child{border-bottom:none}
.next-teams{font-size:0.78rem;font-weight:600;color:var(--text)}
.next-teams span{color:var(--muted);font-weight:400;margin:0 0.3rem}
.next-date{font-size:0.65rem;color:var(--muted);text-align:right}
.next-date strong{display:block;color:var(--green);font-size:0.7rem}
.sport-panel{display:none}.sport-panel.active{display:contents}
.updated-bar{text-align:center;font-size:0.62rem;color:var(--muted2);padding:0.5rem;letter-spacing:0.06em}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(18,20,24,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:0.6rem 0 0.8rem;z-index:300}
.bottom-nav-inner{display:flex;justify-content:space-around}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:0.25rem;cursor:pointer;opacity:0.45;transition:opacity 0.2s}
.bn-item.active{opacity:1}
.bn-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.bn-icon svg{width:20px;height:20px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bn-item.active .bn-icon svg{stroke:var(--orange)}
.bn-label{font-size:0.5rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text)}
.bn-item.active .bn-label{color:var(--orange)}
@media(max-width:900px){.main{grid-template-columns:1fr}.col-right{display:none}.cards-grid{grid-template-columns:1fr}.bottom-nav{display:block}body{padding-bottom:64px}}
</style>
</head>
<body>
<header>
  <a class="logo" href="#"><span class="logo-s">S</span><span class="logo-rest">COREUP</span></a>
  <div class="live-indicator"><div class="live-dot"></div>En Vivo</div>
</header>
<div class="sport-tabs">
  <div class="sport-tab football active" onclick="switchSport('football')">Fútbol</div>
  <div class="sport-tab basketball" onclick="switchSport('basketball')">Baloncesto</div>
</div>
<div class="main">
  <div class="sport-panel active" id="panel-football">
    <div class="col-left">
      <div>
        <div class="sec-header"><span class="sec-title">Partidos <span class="football">Recientes</span></span></div>
        <div id="football-matches"><div class="loading-box"><div class="spinner"></div><div class="loading-text">Cargando...</div></div></div>
      </div>
      <div>
        <div class="sec-header"><span class="sec-title">Próximos <span class="football">Partidos</span></span></div>
        <div id="football-next"><div class="loading-box"><div class="spinner"></div><div class="loading-text">Cargando...</div></div></div>
      </div>
    </div>
    <div class="col-right">
      <div id="football-standings"><div class="loading-box"><div class="spinner"></div><div class="loading-text">Cargando...</div></div></div>
      <div id="football-players"><div class="loading-box"><div class="spinner"></div><div class="loading-text">Cargando...</div></div></div>
    </div>
  </div>
  <div class="sport-panel" id="panel-basketball">
    <div class="col-left">
      <div>
        <div class="sec-header"><span class="sec-title">Partidos <span class="basketball">Recientes</span></span></div>
        <div id="basketball-matches"><div class="loading-box"><div class="spinner blue"></div><div class="loading-text">Cargando...</div></div></div>
      </div>
      <div>
        <div class="sec-header"><span class="sec-title">Próximos <span class="basketball">Partidos</span></span></div>
        <div id="basketball-next"><div class="loading-box"><div class="spinner blue"></div><div class="loading-text">Cargando...</div></div></div>
      </div>
    </div>
    <div class="col-right">
      <div id="basketball-standings"><div class="loading-box"><div class="spinner blue"></div><div class="loading-text">Cargando...</div></div></div>
      <div id="basketball-players"><div class="loading-box"><div class="spinner blue"></div><div class="loading-text">Cargando...</div></div></div>
    </div>
  </div>
</div>
<div class="updated-bar" id="updated-bar"></div>
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <div class="bn-item active"><div class="bn-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/></svg></div><div class="bn-label">En Vivo</div></div>
    <div class="bn-item"><div class="bn-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div><div class="bn-label">Resultados</div></div>
    <div class="bn-item"><div class="bn-icon"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></div><div class="bn-label">Stats</div></div>
    <div class="bn-item"><div class="bn-icon"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div><div class="bn-label">Favoritos</div></div>
    <div class="bn-item"><div class="bn-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="bn-label">Perfil</div></div>
  </div>
</nav>
<script>
const API='https://www.thesportsdb.com/api/v1/json/123';
function switchSport(sport){document.querySelectorAll('.sport-tab').forEach(t=>t.classList.remove('active'));document.querySelector('.sport-tab.'+sport).classList.add('active');document.querySelectorAll('.sport-panel').forEach(p=>p.classList.remove('active'));document.getElementById('panel-'+sport).classList.add('active')}
function formatDate(str){if(!str)return'';const d=new Date(str);return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'})}
function formatTime(dateStr,timeStr){if(!dateStr)return'';const dt=new Date(dateStr+'T'+(timeStr||'00:00:00')+'Z');return dt.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Madrid'})}
function initials(name){if(!name)return'?';return name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()}
function statusBadge(status,time,dateStr){if(status==='Match Finished')return'<span class="card-status ft">Fin.</span>';if(status==='In Progress'||status==='HT')return'<span class="card-status live">'+(status==='HT'?'HT':'En vivo')+'</span>';const t=formatTime(dateStr,time);return'<span class="card-status upcoming">'+(t||'Próximo')+'</span>'}
function errorBox(msg){return'<div class="error-box"><p><strong>Sin datos</strong>'+msg+'</p></div>'}
async function loadFootballMatches(){try{const r=await fetch(API+'/eventspastleague.php?id=4328');const data=await r.json();const events=(data.events||[]).slice(-8).reverse();if(!events.length)throw new Error();document.getElementById('football-matches').innerHTML='<div class="cards-grid">'+events.map(e=>'<div class="match-card football"><div class="card-top"><span class="card-comp">'+( e.strLeague||'Premier League')+'</span>'+statusBadge(e.strStatus,e.strTime,e.dateEvent)+'</div><div class="card-match"><span class="card-team-name">'+e.strHomeTeam+'</span><span class="card-score football">'+(e.intHomeScore??'')+' - '+(e.intAwayScore??'')+'</span><span class="card-team-name right">'+e.strAwayTeam+'</span></div><div class="card-venue">'+(e.strVenue||'')+' '+formatDate(e.dateEvent)+'</div></div>').join('')+'</div>'}catch(e){document.getElementById('football-matches').innerHTML=errorBox('No se pudieron cargar los partidos.')}}
async function loadFootballNext(){try{const r=await fetch(API+'/eventsnextleague.php?id=4328');const data=await r.json();const events=(data.events||[]).slice(0,6);if(!events.length)throw new Error();document.getElementById('football-next').innerHTML='<div class="widget"><div class="widget-header"><span class="widget-title football">Premier League</span><span class="widget-sub">Próximos</span></div>'+events.map(e=>'<div class="next-item"><div class="next-teams">'+e.strHomeTeam+'<span>vs</span>'+e.strAwayTeam+'</div><div class="next-date"><strong>'+formatTime(e.dateEvent,e.strTime)+'</strong>'+formatDate(e.dateEvent)+'</div></div>').join('')+'</div>'}catch(e){document.getElementById('football-next').innerHTML=errorBox('No se pudieron cargar.')}}
async function loadFootballStandings(){try{const r=await fetch(API+'/lookuptable.php?l=4328');const data=await r.json();const table=(data.table||[]).slice(0,8);if(!table.length)throw new Error();document.getElementById('football-standings').innerHTML='<div class="widget"><div class="widget-header"><span class="widget-title football">Premier League</span><span class="widget-sub">Clasificación</span></div><div class="standings-head"><span>#</span><span>Club</span><span>PJ</span><span>G</span><span>P</span><span>Pts</span></div>'+table.map((t,i)=>'<div class="standing-row '+(i<4?'top-f':'')+'"><span class="rk">'+t.intRank+'</span><span class="club">'+t.strTeam+'</span><span>'+t.intPlayed+'</span><span>'+t.intWin+'</span><span>'+t.intLoss+'</span><span class="pts-f">'+t.intPoints+'</span></div>').join('')+'</div>'}catch(e){document.getElementById('football-standings').innerHTML=errorBox('No se pudo cargar la tabla.')}}
async function loadFootballPlayers(){try{const r=await fetch(API+'/lookup_all_players.php?id=133604');const data=await r.json();const players=(data.player||[]).filter(p=>p.strPosition&&p.strPosition!=='Goalkeeper').slice(0,5);if(!players.length)throw new Error();document.getElementById('football-players').innerHTML='<div class="widget"><div class="widget-header"><span class="widget-title football">Jugadores</span><span class="widget-sub">Arsenal FC</span></div>'+players.map((p,i)=>'<div class="scorer-item"><span class="scorer-rank '+(i<2?'top-f':'dim')+'">'+(i+1)+'</span><div class="scorer-avatar">'+initials(p.strPlayer)+'</div><div class="scorer-info"><div class="scorer-name">'+p.strPlayer+'</div><div class="scorer-club">'+(p.strPosition||'')+' '+(p.strNationality||'')+'</div></div><div class="scorer-stat"><span class="num f">'+(p.strNumber||'-')+'</span><span class="lbl">dorsal</span></div></div>').join('')+'</div>'}catch(e){document.getElementById('football-players').innerHTML=errorBox('No se pudieron cargar.')}}
async function loadBasketballMatches(){try{const r=await fetch(API+'/eventspastleague.php?id=4387');const data=await r.json();const events=(data.events||[]).slice(-8).reverse();if(!events.length)throw new Error();document.getElementById('basketball-matches').innerHTML='<div class="cards-grid">'+events.map(e=>'<div class="match-card basketball"><div class="card-top"><span class="card-comp">NBA</span>'+statusBadge(e.strStatus,e.strTime,e.dateEvent)+'</div><div class="card-match"><span class="card-team-name">'+e.strHomeTeam+'</span><span class="card-score basketball">'+(e.intHomeScore??'')+' - '+(e.intAwayScore??'')+'</span><span class="card-team-name right">'+e.strAwayTeam+'</span></div><div class="card-venue">'+(e.strVenue||'')+' '+formatDate(e.dateEvent)+'</div></div>').join('')+'</div>'}catch(e){document.getElementById('basketball-matches').innerHTML=errorBox('No se pudieron cargar.')}}
async function loadBasketballNext(){try{const r=await fetch(API+'/eventsnextleague.php?id=4387');const data=await r.json();const events=(data.events||[]).slice(0,6);if(!events.length)throw new Error();document.getElementById('basketball-next').innerHTML='<div class="widget"><div class="widget-header"><span class="widget-title basketball">NBA</span><span class="widget-sub">Próximos</span></div>'+events.map(e=>'<div class="next-item"><div class="next-teams">'+e.strHomeTeam+'<span>vs</span>'+e.strAwayTeam+'</div><div class="next-date"><strong>'+formatTime(e.dateEvent,e.strTime)+'</strong>'+formatDate(e.dateEvent)+'</div></div>').join('')+'</div>'}catch(e){document.getElementById('basketball-next').innerHTML=errorBox('No se pudieron cargar.')}}
async function loadBasketballStandings(){try{const r=await fetch(API+'/lookuptable.php?l=4387');const data=await r.json();const table=(data.table||[]).slice(0,8);if(!table.length)throw new Error();document.getElementById('basketball-standings').innerHTML='<div class="widget"><div class="widget-header"><span class="widget-title basketball">NBA</span><span class="widget-sub">Clasificación</span></div><div class="standings-head"><span>#</span><span>Equipo</span><span>PJ</span><span>G</span><span>P</span><span>Pts</span></div>'+table.map((t,i)=>'<div class="standing-row '+(i<4?'top-b':'')+'"><span class="rk">'+t.intRank+'</span><span class="club">'+t.strTeam+'</span><span>'+t.intPlayed+'</span><span>'+t.intWin+'</span><span>'+t.intLoss+'</span><span class="pts-b">'+t.intPoints+'</span></div>').join('')+'</div>'}catch(e){document.getElementById('basketball-standings').innerHTML=errorBox('No se pudo cargar.')}}
async function loadBasketballPlayers(){try{const r=await fetch(API+'/lookup_all_players.php?id=134880');const data=await r.json();const players=(data.player||[]).slice(0,5);if(!players.length)throw new Error();document.getElementById('basketball-players').innerHTML='<div class="widget"><div class="widget-header"><span class="widget-title basketball">Jugadores</span><span class="widget-sub">LA Lakers</span></div>'+players.map((p,i)=>'<div class="scorer-item"><span class="scorer-rank '+(i<2?'top-b':'dim')+'">'+(i+1)+'</span><div class="scorer-avatar">'+initials(p.strPlayer)+'</div><div class="scorer-info"><div class="scorer-name">'+p.strPlayer+'</div><div class="scorer-club">'+(p.strPosition||'')+' '+(p.strNationality||'')+'</div></div><div class="scorer-stat"><span class="num b">'+(p.strNumber||'-')+'</span><span class="lbl">dorsal</span></div></div>').join('')+'</div>'}catch(e){document.getElementById('basketball-players').innerHTML=errorBox('No se pudieron cargar.')}}
async function loadAll(){await Promise.all([loadFootballMatches(),loadFootballNext(),loadFootballStandings(),loadFootballPlayers(),loadBasketballMatches(),loadBasketballNext(),loadBasketballStandings(),loadBasketballPlayers()]);const now=new Date();document.getElementById('updated-bar').textContent='Actualizado: '+now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}
loadAll();setInterval(loadAll,120000);
</script>
</body>
